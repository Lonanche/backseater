# Builds the Windows installer with Velopack and publishes it to GitHub
# Releases whenever a version tag (v*) is pushed. The in-app updater
# (crates/app/src/updater.rs) reads the same releases feed.
#
# Releasing: bump the workspace version in Cargo.toml, add a CHANGELOG.md
# section for the version, commit, then
#   git tag v0.2.0 && git push origin v0.2.0
#
# Releases ship unsigned. If code signing is added later, it slots in at two
# points: backseater.exe before `vpk pack`, and the Setup.exe after it.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # bks-kick's `wreq` compiles BoringSSL from source: NASM for its x64
      # assembly, libclang for bindgen (LLVM is preinstalled on the runner).
      - uses: ilammy/setup-nasm@v1
      - name: Point bindgen at the runner's libclang
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build

      # A tag with a pre-release suffix (v0.3.0-beta.1) publishes as a GitHub
      # pre-release: only users with "Get beta updates" enabled receive it.
      - name: Version from tag
        id: version
        run: |
          echo "version=$($env:GITHUB_REF_NAME -replace '^v')" >> $env:GITHUB_OUTPUT
          echo "pre=$(if ($env:GITHUB_REF_NAME -match '-') { 'true' } else { 'false' })" >> $env:GITHUB_OUTPUT

      # The tag's "## vX.Y.Z" section of CHANGELOG.md becomes the release notes.
      # A pre-release tag (v0.2.2-beta.1) falls back to its stable section
      # (## v0.2.2) — betas inherit the upcoming version's notes, so the
      # changelog keeps one section per stable version, no beta sections.
      - name: Extract release notes
        run: |
          $content = Get-Content CHANGELOG.md -Raw
          function Find-Notes($header) {
            $m = [regex]::Match($content, "(?ms)^## $([regex]::Escape($header))\s*?\r?\n(.*?)(?=^## |\z)")
            if ($m.Success) { $m.Groups[1].Value.Trim() } else { $null }
          }
          $notes = Find-Notes $env:GITHUB_REF_NAME
          if (-not $notes) { $notes = Find-Notes ($env:GITHUB_REF_NAME -replace '-.*$') }
          if (-not $notes) { $notes = "_No changelog entry for this release._" }
          Set-Content notes.md $notes -Encoding utf8

      - run: cargo build --release -p backseater

      # Assets and the icon are embedded in the exe, so the install payload is
      # the single binary.
      - name: Stage install payload
        run: |
          New-Item -ItemType Directory publish | Out-Null
          Copy-Item target\release\backseater.exe publish\

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      # Fetch the previous release so vpk can build a delta package from it;
      # the first release has nothing to download, which is fine.
      - name: Download previous release
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} ${{ steps.version.outputs.pre == 'true' && '--pre' || '' }}
        continue-on-error: true

      - name: Build installer
        run: >
          vpk pack
          --packId Backseater
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish
          --mainExe backseater.exe
          --packTitle Backseater
          --packAuthors Lonanche
          --icon crates\app\resources\icon.ico
          --releaseNotes notes.md

      - name: Publish to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --releaseName "Backseater ${{ steps.version.outputs.version }}"
          --tag ${{ github.ref_name }}
          ${{ steps.version.outputs.pre == 'true' && '--pre' || '' }}
